<!DOCTYPE html>
<html>
    <head>
        <title>CBC Analysis</title>
        <meta name="viewport"
        content="width=device-width,initial-scale=1.0">
        <style>
          body{
            margin: 0;
            padding-top: 90px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            
            font-family: Arial, sans-serif;
            background-image: url("images/lab3.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }
        body::before{
            content: "";
            position: fixed;
            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background: rgba(255, 245, 247, 0.85);
            z-index: -1;
        }
            h3{
                font-size: 24px;
                margin-bottom: 20px;
            }
            input {
                padding: 12px;
                width: 250px;
                border-radius: 12px;
                border: 1px solid #ccc ;
                font-size: 16px;
                margin-bottom: 10px;
                text-align: center;
            }
            button {
                background-color: #8b0000;
                color: white;
                padding: 12px 25px;
                border: none;
                border-radius: 12px;
                cursor: pointer;
                font-size: 16px;
                margin-top: 10px;
            }
            button:hover{
                background-color: #a30000;
            }
            #result{
                 margin-top: 20px;
                 padding: 15px;
                 border-radius: 15px;
                 width: 60%;
                 margin-left: auto;
                 margin-right: auto;
                 font-size: 16px;
                 line-height: 1.6;
            }
            .low {
                color: red;
            }
            .normal {
                color: green;
            }
            .high {
                color: orange;
            }
            .box-problem{
                background-color: #ffecec;
                border: 2px solid red;
            }
            .box-normal{
                background-color: #e8ffe8;
                border: 2px solid green;
            }
            .row{
                display: flex;
                justify-content: center;
                align-items: center;
                margin-bottom: 12px;
                gap: 10px;
            }
            label{
                width: 140px;
                text-align: right;
                font-size: 16px;
            }
            header{
                background-color: #8b0000;
                color: white;
                padding: 15px;
                font-size: 28px;
                font-weight: bold;
                text-align: left;
                padding-left: 20px;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
            }
            footer{
                margin-top: auto;
                padding: 15px;
                background-color: #8b0000;
                color: white;
                font-size: 14px;
                text-align: center;
            }
             main{
                flex: 1;
                padding: 20px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <header>
            Medical Test
        </header>
        <main>
        <h3>Enter your CBC results: </h3>
        <div class="row">
        <label>WBC: </label>
        <input type="number" id="wbc"></div>
        <div class="row">
        <label>RBC: </label>
        <input type="number" id="rbc"></div>
        <div class="row">
        <label>Hemoglobin (HGB): </label>
        <input type="number" id="hgb"></div>
        <button onclick="checkCBC()">Check Results</button>
        <p id="result"></p>
        </main>
        <footer>
              © 2026 Medical Lab Guide | Pathologist Maryam Falah
        </footer>
        <script>
            function checkCBC(){
                let wbc = parseFloat(document.getElementById("wbc").value);
                let rbc = parseFloat(document.getElementById("rbc").value);
                let hgb = parseFloat(document.getElementById("hgb").value);
                let resultText ="";
                let status="normal";

                //WBC
                if (wbc < 4){
                  resultText += "<span class='low'>WBC: Low ❗ - Weak immunity</span><br>";
                  status="problem";
                } else if (wbc <= 11){
                resultText += "<span class='normal'>WBC: Normal ✅</span><br>";
             } else {
                resultText += "<span class='high'>WBC: High ⚠️ - Possible infection</span><br>";
                  status="problem";
                }
               // RBC
               if (rbc < 4.5) {
                resultText += "<span class='low'>RBC: Low ❗ - Possible anemia</span><br>";
                status="problem";
            } else if (rbc <= 5.9) {
                resultText += "<span class='normal'>RBC: Normal ✅</span><br>";
            } else {
                resultText += "<span class='high'>RBC: High ⚠️</span><br>";
                status="problem";
             }
             // Hemoglobin
             if (hgb < 13) {
                 resultText += "<span class='low'>Hemoglobin: Low ❗ - Eat iron-rich foods</span><br>";
                 status="problem";
                } else if (hgb <= 17) {
                    resultText += "<span class='normal'>Hemoglobin: Normal ✅ - Keep healthy!</span><br>";
                } else {
                    resultText += "<span class='high'>Hemoglobin: High ⚠️</span><br>";
                    status="problem";
                }
                let resultBox = document.getElementById("result");
                if (status==="normal") {
                    resultBox.className="box-normal";
                    resultText+="<br><b style='color:green'>overall: your results are normal ✅ Keep healthy!</b>";
                } else{
                     resultBox.className = "box-problem";
                    resultText += "<br><b style='color:red'>Overall: Some results are not normal ⚠️ Please take care!</b>";
                }
                resultBox.innerHTML = resultText;
            }
        </script>
    </body>
</html>
