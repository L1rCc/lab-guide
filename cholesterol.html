<!DOCTYPE html>
<html>
<head>
    <title>Cholesterol Analysis</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <style>
        body{
            margin: 0;
            padding-top: 90px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            
            font-family: Arial, sans-serif;
            background-image: url("images/lab3.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }
        body::before{
            content: "";
            position: fixed;
            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background: rgba(255, 245, 247, 0.85);
            z-index: -1;
        }
        input {
            padding: 12px;
            width: 250px;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-size: 16px;
            text-align: center;
        }

        button {
            background-color: #8b0000;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover{
            background-color: #a30000;
        }

        #result{
            margin-top: 20px;
            padding: 15px;
            border-radius: 15px;
            width: 60%;
            margin-left: auto;
            margin-right: auto;
            font-size: 16px;
            line-height: 1.5;
        }

        .low { color: orange; }
        .normal { color: green; }
        .high { color: red; }

        .box-normal{
            background-color: #e8ffe8;
            border: 2px solid green;
        }

        .box-problem{
            background-color: #ffecec;
            border: 2px solid red;
        }

        header{
            background-color: #8b0000;
            color: white;
            padding: 15px;
            font-size: 28px;
            font-weight: bold;
            text-align: left;
            padding-left: 20px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
        }

        footer{
            margin-top: auto;
            padding: 15px;
            background-color: #8b0000;
            color: white;
            font-size: 14px;
            text-align: center;
        }

        main{
            flex: 1;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>

<body>

    <header>
        Medical Test
    </header>

    <main>

        <h3>Enter your Cholesterol result:</h3>

        <input type="number" id="chol"><br><br>

        <button onclick="checkChol()">Check Result</button>

        <p id="result"></p>

    </main>

    <footer>
        © 2026 Medical Lab Guide | Pathologist Maryam Falah
    </footer>

    <script>
        function checkChol(){

            let chol = parseFloat(document.getElementById("chol").value);

            // 🔴 حماية من الإدخال الفارغ
            if (!chol && chol !== 0) {
                document.getElementById("result").innerHTML =
                "<b style='color:red'>Please enter a cholesterol value ⚠️</b>";
                return;
            }

            let resultText = "";
            let status = "normal";

            // Normal range
            if (chol < 200){
                resultText += "<span class='normal'>Normal Cholesterol ✅</span><br>";
            } 
            else if (chol <= 239){
                resultText += "<span class='high'>Borderline ⚠️</span><br>";
                status = "problem";
            } 
            else {
                resultText += "<span class='high'>High Cholesterol ❗</span><br>";
                status = "problem";
            }

            let resultBox = document.getElementById("result");

            if (status === "normal"){
                resultBox.className = "box-normal";
                resultText += "<br><b style='color:green'>Good job ✅ keep healthy diet</b>";
            } else {
                resultBox.className = "box-problem";
                resultText += "<br><b style='color:red'>Watch your diet ⚠️</b>";
            }

            resultBox.innerHTML = resultText;
        }
    </script>

</body>
</html>
